<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testar envio de dicas</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 20px; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 8px; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .result { margin-top: 16px; padding: 12px; border-radius: 8px; white-space: pre-wrap; font-size: 14px; }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <h1>Testar dicas por e-mail</h1>
  <p>Chama a API que envia dicas para admins/pastores/secretários cadastrados.</p>
  <input type="text" id="url" placeholder="URL do app (ex: https://church-gest-oficial.vercel.app)" value="https://church-gest-oficial.vercel.app">
  <button id="btn">Enviar dicas agora</button>
  <div id="result"></div>
  <script>
    const urlInput = document.getElementById('url');
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');
    btn.onclick = async () => {
      btn.disabled = true;
      result.textContent = 'Enviando...';
      result.className = 'result';
      try {
        const base = urlInput.value.replace(/\/$/, '');
        const res = await fetch(base + '/api/send-tips', { method: 'POST' });
        const data = await res.json();
        result.className = 'result ' + (res.ok ? 'success' : 'error');
        result.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        result.className = 'result error';
        result.textContent = 'Erro: ' + e.message;
      }
      btn.disabled = false;
    };
  </script>
</body>
</html>
